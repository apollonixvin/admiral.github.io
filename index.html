<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZARUБEZНЫЙ GARAGE | Топовый Автоконтент</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Condensed:wght@400;700&display=swap');

        :root {
            --accent-yellow: #FFFF00;
            --accent-red: #ff0000;
            --text-color: #ffffff;
            --btn-dark: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: 'Roboto Condensed', sans-serif;
            color: var(--text-color);
            background-color: #111;
        }

        /* --- ФОН --- */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            /* Добавил точку и слеш, чтобы жестко указать на текущую папку */
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%);
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px 20px;
            box-sizing: border-box;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- ШАПКА --- */
        header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2.2em, 7vw, 4.5em);
            margin: 0;
            text-transform: uppercase;
            color: var(--accent-yellow);
            line-height: 1.1;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        header h1 span {
            color: #fff;
        }

        /* Новый, агрессивный призыв к действию */
        header p {
            font-size: clamp(1em, 3vw, 1.3em);
            color: #eaeaea;
            margin: 15px auto 25px auto;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.4;
            max-width: 800px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--accent-yellow);
            padding-bottom: 15px;
        }

        /* --- ВИДЕОПЛЕЕР --- */
        .video-box {
            width: 100%;
            max-width: 850px;
            background: #000;
            border: 3px solid var(--accent-yellow);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 25px rgba(255,255,0,0.2);
            margin-bottom: 30px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* --- КНОПКИ --- */
        .buttons-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 850px;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 20px;
            font-size: clamp(0.9em, 2.5vw, 1.1em);
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            border: none;
        }

        .btn-yt { background-color: var(--accent-red); color: #fff; box-shadow: 0 6px 20px rgba(255, 0, 0, 0.3); }
        .btn-tg { background-color: var(--accent-yellow); color: #000; box-shadow: 0 6px 20px rgba(255, 255, 0, 0.3); }
        .btn-collab { grid-column: 1 / -1; background-color: rgba(30, 30, 30, 0.8); color: #fff; border: 2px solid #555; backdrop-filter: blur(5px); }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(255,255,255,0.2); }
        .btn:active { transform: scale(0.97); }

        @media (max-width: 650px) {
            .buttons-grid { grid-template-columns: 1fr; gap: 12px; }
            header { margin-bottom: 15px; }
            .content-wrapper { padding: 15px; }
            .btn { padding: 18px 10px; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <div class="content-wrapper">
        <header>
            <h1>ZARUБEZНЫЙ <span>GARAGE</span></h1>
            <p>САМЫЕ БЕЗУМНЫЕ ПРОЕКТЫ ЗАПАДА. ЖМИ ПЛЕЙ, А ЗА ЭКСКЛЮЗИВОМ — ЗАЛЕТАЙ В ТЕЛЕГУ! 🔥</p>
        </header>

        <div class="video-box">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/xfGCy5d4Dzw" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>

        <div class="buttons-grid">
            <a href="https://www.youtube.com/@ShiftTranslate" target="_blank" class="btn btn-yt">СМОТРЕТЬ КАНАЛ YOUTUBE 📺</a>
            <a href="https://t.me/shift_translate" target="_blank" class="btn btn-tg">ПОДПИСАТЬСЯ В TELEGRAM 🚀</a>
            <a href="https://t.me/art1fuckt" target="_blank" class="btn btn-collab">СОТРУДНИЧАТЬ / РЕКЛАМА 🤝</a>
        </div>
    </div>
</body>
</html>
